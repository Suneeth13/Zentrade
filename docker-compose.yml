# Docker Compose for Clara Answers Pipeline
# Zero-cost automation with n8n

version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: clara_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=clara123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=America/Los_Angeles
    volumes:
      - n8n_data:/home/node/.n8n
      - ./dataset:/data/dataset
      - ./outputs:/data/outputs
      - ./workflows:/data/workflows
    restart: unless-stopped

  # Optional: Local LLM for extraction (CPU-based)
  # Uncomment if you want local AI processing
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: clara_llm
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped

volumes:
  n8n_data:
  # ollama_data:

networks:
  default:
    name: clara_network

